    const [syncStatus, setSyncStatus] = useState('idle'); // idle | saving | saved | error
    const [lastSynced, setLastSynced] = useState(null);
    const syncTimer = useRef(null);

    // ── Firebase 저장 ─────────────────────────────────────────────
    const saveToFirebase = useRef(null);
    saveToFirebase.current = async (data) => {
        setSyncStatus('saving');
        try {
            await db.collection('teacher_master').doc(DOC_ID).set(data, { merge: true });
            setSyncStatus('saved');
            setLastSynced(new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}));
            setTimeout(() => setSyncStatus('idle'), 3000);
        } catch(e) {
            console.error('Firebase 저장 오류:', e);
            setSyncStatus('error');
            setTimeout(() => setSyncStatus('idle'), 4000);
        }
    };

    // ── Firebase 불러오기 (최초 1회) ──────────────────────────────
    useEffect(() => {
        setSyncStatus('saving');
        db.collection('teacher_master').doc(DOC_ID).get().then(doc => {
            if (doc.exists) {
                const d = doc.data();
                if (d.weeklySchedule) setWeeklySchedule(d.weeklySchedule);
                if (d.progress) setProgress(d.progress);
                if (d.events) setEvents(d.events);
                if (d.todos) setTodos(d.todos);
                if (d.readingLogs) setReadingLogs(d.readingLogs);
                if (d.quickLinks) setQuickLinks(d.quickLinks);
                if (d.forestMemoLogs) setForestMemoLogs(d.forestMemoLogs);
                if (d.classConfig) setClassConfig(d.classConfig);
                setSyncStatus('saved');
                setLastSynced(new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}));
                setTimeout(() => setSyncStatus('idle'), 2000);
            } else {
                // Firebase에 데이터 없음 → 로컬 데이터 그대로 사용
                setSyncStatus('idle');
            }
        }).catch(e => {
            console.error('Firebase 불러오기 오류:', e);
            setSyncStatus('error');
            setTimeout(() => setSyncStatus('idle'), 3000);
        });
    }, []);


    // 교시 시작 분(분단위) 계산
    const getPeriodStartMin = (day, pIdx) => {
        if (pIdx < 4) {
            const base = (day === "월" ? 9*60 : 8*60+50);
            return base + pIdx*55;
        } else {
            const base = (day === "월" ? 13*60+40 : 13*60+30);
            return base + (pIdx-4)*55;
        }
    };

    const getPeriodTime = (day, pIdx) => {
        const sT = getPeriodStartMin(day, pIdx);
        const pad = n => String(n).padStart(2,'0');
        const sH=Math.floor(sT/60), sM=sT%60, eT=sT+45, eH=Math.floor(eT/60), eM=eT%60;
        return `${pad(sH)}:${pad(sM)} - ${pad(eH)}:${pad(eM)}`;
    };

    // 시간/날짜 갱신 + 알람 체크
    useEffect(() => {
        // 브라우저 알림 권한 요청
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        const fired = firedRef.current;

        const interval = setInterval(() => {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2,'0');
            const mm = String(now.getMinutes()).padStart(2,'0');
            const ss = now.getSeconds();
            setCurrentTime(`${hh}:${mm}`);
            // 30분마다 명언 교체
            if (ss === 0 && now.getMinutes() % 30 === 0) {
                setQuoteIdx(prev => (prev + 1) % quotes.length);
            }
            const current = getSystemDate();
            if (current !== todayISO) {
                setTodayISO(current);
                if (activeTab === 'home') setViewDate(current);
            }
            // 수업 알람: 매 초 체크하되 정각(ss===0)에만 발동
            if (ss === 0) {
                const todayName = ["일","월","화","수","목","금","토"][now.getDay()];
                const schedule = weeklySchedule[todayName] || [];
                schedule.forEach((cls, i) => {
                    if (!cls || !cls.trim()) return;
                    const startMin = getPeriodStartMin(todayName, i);
                    const alarmH = Math.floor(startMin/60);
                    const alarmM = startMin % 60;
                    if (now.getHours() === alarmH && now.getMinutes() === alarmM) {
                        const key = `${current}_p${i}`;
                        if (fired[key]) return;
                        fired[key] = true;
                        localStorage.setItem('tm_v27_fired', JSON.stringify(fired));
                        const toastId = Date.now();
                        const timeStr = `${String(alarmH).padStart(2,'0')}:${String(alarmM).padStart(2,'0')}`;
                        setAlarmToasts(prev => [...prev, { id: toastId, period: i+1, className: cls, time: timeStr }]);
                        // OS 알림
                        if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
                            try { new Notification(`🔔 ${i+1}교시 수업 시작`, { body: `${cls} 수업이 시작되었습니다. (${timeStr})` }); } catch(e) {}
                        }
                        setTimeout(() => setAlarmToasts(prev => prev.filter(t => t.id !== toastId)), 9000);
                    }
                });
            }
        }, 1000);
        return () => clearInterval(interval);
    }, [todayISO, activeTab, weeklySchedule]);

    // 데이터 저장 (localStorage + Firebase 자동 동기화)
    useEffect(() => {
        // localStorage 백업 (오프라인 대비)
        localStorage.setItem('tm_v26_weekly', JSON.stringify(weeklySchedule));
        localStorage.setItem('tm_v26_progress', JSON.stringify(progress));
        localStorage.setItem('tm_v26_events', JSON.stringify(events));
        localStorage.setItem('tm_v26_todos', JSON.stringify(todos));
        localStorage.setItem('tm_v26_reading', JSON.stringify(readingLogs));
        localStorage.setItem('tm_v26_links', JSON.stringify(quickLinks));
        localStorage.setItem('tm_v26_memo_logs', JSON.stringify(forestMemoLogs));
        localStorage.setItem('tm_v26_classconfig', JSON.stringify(classConfig));

        if (syncTimer.current) clearTimeout(syncTimer.current);

            saveToFirebase.current({
                weeklySchedule, progress, events, todos,
                readingLogs, quickLinks, forestMemoLogs, classConfig,

        const f = new Date(d.getFullYear(), d.getMonth(), 1).getDay();

        const arr = [];
        for(let i=0;i<f;i++) arr.push(null);
        for(let i=1;i<=l;i++) arr.push(new Date(d.getFullYear(), d.getMonth(), i).toISOString().split('T')[0]);

                        h('div', {className:"glass-card rounded-[2.5rem] p-7 shadow-sm border-l-8 border-[#a0522d]"}, [
                            h('h4', {className:"text-[10px] font-black text-slate-400 uppercase mb-4 flex items-center gap-2"}, [h('i', {'data-lucide':'pen-line', className:'w-3 h-3'}), " 새 메모 작성"]),
                            h('textarea', {
                                value: forestMemoInput,
                                onChange: (e) => setForestMemoInput(e.target.value),
                                onKeyDown: (e) => { if(e.key==='Enter'&&e.ctrlKey) saveForestMemo(); },
                                placeholder: "수업 아이디어, 중요 메모, 학생 관찰 내용 등을 자유롭게 기록하세요...\n(Ctrl+Enter 로 저장)",
                                className: "w-full bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-600 outline-none resize-none no-scrollbar px-5 py-4 focus:ring-2 focus:ring-orange-100",
                                rows: 4
                            }),
                            h('div', {className:"flex justify-end mt-3"}, [
                                h('button', {
                                    onClick: saveForestMemo,
                                    className: "bg-[#a0522d] text-white rounded-2xl px-8 py-3 text-sm font-black shadow-md hover:bg-[#8b4513] transition-all flex items-center gap-2"
                                }, [h('i', {'data-lucide':'save', className:'w-4 h-4'}), " 저장"])
                            ])
                        ]),
                        // 누적 기록 목록
                        h('div', {className:"glass-card rounded-[2.5rem] overflow-hidden shadow-sm"}, [
                            h('div', {className:"px-8 py-5 border-b bg-slate-50 flex justify-between items-center"}, [
                                h('div', {className:"flex items-center gap-2"}, [
                                    h('i', {'data-lucide':'clock', className:'w-4 h-4 text-[#a0522d]'}),
                                    h('span', {className:"text-[11px] font-black text-slate-600 uppercase tracking-wider"}, "누적 기록")
                                ]),
                                forestMemoLogs.length > 0 && h('button', {
                                    onClick: () => confirm('모든 메모를 삭제할까요?') && setForestMemoLogs([]),
                                    className: "text-[10px] font-bold text-red-300 hover:text-red-500 underline"
                                }, "전체 삭제")
                            ]),
                            forestMemoLogs.length === 0
                                ? h('div', {className:"py-16 text-center"}, [
                                    h('i', {'data-lucide':'sticky-note', className:'w-8 h-8 text-slate-200 mx-auto mb-3'}),
                                    h('p', {className:"text-slate-300 font-black text-sm"}, "아직 기록이 없습니다"),
                                    h('p', {className:"text-slate-200 font-bold text-xs mt-1"}, "위 입력창에 메모를 작성하고 저장 버튼을 눌러보세요")
                                ])
                                : h('div', {className:"divide-y max-h-[calc(100vh-360px)] overflow-y-auto no-scrollbar"},
                                    forestMemoLogs.map(log =>
                                        h('div', {key:log.id, className:"flex gap-5 px-8 py-5 hover:bg-orange-50/30 transition-colors"}, [
                                            // 타임스탬프
                                            h('div', {className:"shrink-0 text-right min-w-[68px] pt-0.5"}, [
                                                h('p', {className:"text-[10px] font-black text-[#a0522d]"}, log.date.slice(5).replace('-','/')),
                                                h('p', {className:"text-[9px] font-bold text-slate-400"}, `${log.dayName}요일`),
                                                h('p', {className:"text-[9px] font-bold text-slate-300"}, log.time)
                                            ]),
                                            // 구분선
                                            h('div', {className:"w-px bg-orange-100 shrink-0 self-stretch"}),
                                            // 내용
                                            h('p', {className:"text-sm font-bold text-slate-700 flex-grow leading-relaxed whitespace-pre-wrap"}, log.text),
                                            // 삭제 버튼 (항상 표시)
                                            h('button', {
                                                onClick: () => setForestMemoLogs(prev=>prev.filter(l=>l.id!==log.id)),
                                                className:"shrink-0 w-8 h-8 flex items-center justify-center rounded-xl text-slate-300 hover:text-red-500 hover:bg-red-50 transition-all self-start mt-0.5"
                                            }, h('i', {'data-lucide':'trash-2', className:'w-4 h-4'}))
                                        ])
                                    )
                                )
                        ])
                    ]),

                    // ── 독서 탭 ───────────────────────────────────────
                    activeTab === 'reading' && h(BookshelfView, {key: 'bookshelf'}),

                    // ── 설정 탭 ───────────────────────────────────────
                    activeTab === 'settings' && h('div', { className: "space-y-6 animate-in" }, [
                        h('div', { className: "glass-card rounded-[3rem] p-10" }, [
                            h('h3', { className: "font-black text-slate-800 mb-2" }, "학기 기초 시간표 및 학급 설정"),
                            h('div', { className: "flex items-center gap-2 mb-8 bg-orange-50 rounded-2xl px-4 py-3" }, [
                                h('i', {'data-lucide':'bell', className:'w-4 h-4 text-[#a0522d] shrink-0'}),
                                h('p', { className: "text-xs font-bold text-orange-700" }, "수업이 입력된 교시는 시작 시각에 자동으로 알림창이 표시됩니다. 브라우저 알림을 허용하면 OS 알림도 수신됩니다.")
                            ]),
                            h('div', { className: "grid grid-cols-5 gap-4" },
                                ["월","화","수","목","금"].map(day =>
                                    h('div', {key:day, className:"space-y-3"}, [
                                        h('p', {className:"text-center font-black text-[#a0522d] py-1 bg-orange-50 rounded-lg text-xs"}, day),
                                        ...[0,1,2,3,4,5,6].filter(idx=>(day==='월'||day==='금')?idx<6:true).map(i =>
                                            h('div', {key:i}, [
                                                h('p', {className:"text-[8px] text-center font-bold text-slate-300"}, getPeriodTime(day,i)),
                                                h('input', {
                                                    className:"w-full bg-white border border-slate-200 rounded-xl p-3 text-[10px] font-bold text-center outline-none focus:ring-2 focus:ring-orange-200 shadow-sm",
                                                    value: weeklySchedule[day]?.[i] || "",
                                                    onChange:(e)=>{const up={...weeklySchedule};if(!up[day])up[day]=[];up[day][i]=e.target.value;setWeeklySchedule({...up});}
                                                })
                                            ])
                                        )
                                    ])
                                )
                            )
                        ])
                    ])
                ]),

                // ── 우측 TO-DO ────────────────────────────────────────
                h('div', { className: "col-span-3" }, [
                    h('section', { className: "glass-card rounded-[2.5rem] p-6 min-h-[500px] flex flex-col border-r-4 border-r-orange-100 shadow-sm" }, [
                        h('div', {className:"flex justify-between items-center mb-6 px-1"}, [
                            h('h3', {className:"text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"}, [h('i', {'data-lucide':'check-square', className:'text-[#a0522d]'}), " 업무 TO-DO"]),
                            h('button', {onClick:()=>{setEditTarget(null);setModals({...modals,todo:true});}, className:"text-[9px] font-black bg-orange-50 text-[#a0522d] px-3 py-1.5 rounded-xl hover:bg-orange-100 transition-all shadow-sm"}, "+ 추가")
                        ]),
                        h('div', {className:"space-y-2 overflow-y-auto no-scrollbar flex-grow"}, [
                            ...todos.filter(t=>!t.done).map(t =>
                                h('div', {key:t.id, className:"flex items-center gap-3 p-4 bg-white border rounded-2xl group shadow-sm transition-all hover:border-orange-200 cursor-pointer", onClick:()=>{setEditTarget(t);setModals({...modals,todo:true});}}, [
                                    h('div', {onClick:(e)=>{e.stopPropagation();toggleTodo(t.id);}, className:"w-5 h-5 border-2 border-slate-200 rounded-full hover:border-orange-400 shrink-0 flex items-center justify-center transition-all"}),
                                    h('span', {className:"text-sm font-bold text-slate-600 flex-grow leading-tight"}, t.text)
                                ])
                            ),
                            h('div', {className:"mt-6 border-t border-dashed pt-4 space-y-2 opacity-60"},
                                todos.filter(t=>t.done).slice(0,3).map(t =>
                                    h('div', {key:t.id, className:"flex items-center gap-2 text-xs font-bold todo-done-line cursor-pointer", onClick:()=>toggleTodo(t.id)}, [
                                        h('i', {'data-lucide':'check', className:'w-3 h-3 text-emerald-500'}), t.text
                                    ])
                                )
                            )
                        ])
                    ])
                ])
            ])
        ]),

        // ── 모달: 링크 ───────────────────────────────────────────────
        modals.link && h('div', {className:"fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4", onClick:()=>setModals({...modals,link:false})},
            h('div', {className:"bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 modal-enter", onClick:e=>e.stopPropagation()}, [
                h('h4', {className:"text-xl font-black mb-6"}, "필수 링크 추가"),
                h('input', {id:'link-title', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black mb-3 outline-none", placeholder:"사이트 명 (예: 나이스)"}),
                h('input', {id:'link-url', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black mb-6 outline-none", placeholder:"https://..."}),
                h('button', {onClick:()=>{
                    const title=document.getElementById('link-title').value;
                    const url=document.getElementById('link-url').value;
                    if(!title||!url)return;
                    setQuickLinks([...quickLinks,{id:Date.now(),title,url}]);
                    setModals({...modals,link:false});
                }, className:"w-full bg-blue-600 text-white font-black py-4 rounded-2xl"}, "링크 저장")
            ])
        ),

        // ── 모달: 진도 기록 ──────────────────────────────────────────
        modals.progress && selectedSlot && h('div', {className:"fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4", onClick:()=>setModals({...modals,progress:false})},
            h('div', {className:"bg-white w-full max-w-lg rounded-[3rem] shadow-2xl overflow-hidden modal-enter", onClick:e=>e.stopPropagation()}, [
                h('div', {className:"p-8 autumn-gradient text-white flex justify-between items-center"}, [
                    h('div', null, [h('h4', {className:"text-2xl font-black"}, "진도 기록"), h('p', {className:"text-xs font-bold opacity-60 uppercase"}, `${selectedSlot.className} / ${selectedSlot.date}`)]),
                    h('button', {onClick:()=>setModals({...modals,progress:false})}, h('i', {'data-lucide':'x'}))
                ]),
                h('div', {className:"p-8 space-y-4"}, [
                    h('input', {id:'prog-topic', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black outline-none focus:ring-4 focus:ring-orange-100", defaultValue:editTarget?.topic||"", placeholder:"오늘 수업 주제", autoFocus:true}),
                    h('textarea', {id:'prog-memo', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-bold resize-none outline-none focus:ring-4 focus:ring-orange-100", rows:3, defaultValue:editTarget?.memo||"", placeholder:"메모"}),
                    h('button', {onClick:()=>{
                        const topic=document.getElementById('prog-topic').value;
                        if(!topic)return;
                        const newData={id:editTarget?.id||Date.now(),...selectedSlot,topic,memo:document.getElementById('prog-memo').value};
                        setProgress([newData,...progress.filter(p=>p.id!==newData.id&&!(p.date===newData.date&&p.period===newData.period&&p.className===newData.className))]);
                        setModals({...modals,progress:false});
                    }, className:"w-full bg-[#a0522d] text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95"}, "저장")
                ])
            ])
        ),

        // ── 모달: 일정 ───────────────────────────────────────────────
        modals.event && h('div', {className:"fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4", onClick:()=>setModals({...modals,event:false})},
            h('div', {className:"bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 modal-enter", onClick:e=>e.stopPropagation()}, [
                h('h4', {className:"text-xl font-black mb-6"}, editTarget?"일정 수정":"일정 추가"),
                h('input', {id:'evt-title', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black mb-6 outline-none focus:ring-4 focus:ring-orange-100", defaultValue:editTarget?.title||"", placeholder:"내용 입력", autoFocus:true}),
                h('div', {className:"flex gap-2"}, [
                    h('button', {onClick:()=>{
                        const title=document.getElementById('evt-title').value;
                        if(!title)return;
                        if(editTarget)setEvents(events.map(e=>e.id===editTarget.id?{...e,title}:e));
                        else setEvents([...events,{id:Date.now(),date:viewDate,title,type:modals.type||'academic'}]);
                        setModals({...modals,event:false});
                    }, className:"flex-1 bg-[#a0522d] text-white font-black py-4 rounded-2xl shadow-lg"}, "저장"),
                    h('button', {onClick:()=>setModals({...modals,event:false}), className:"flex-1 bg-slate-100 font-bold py-4 rounded-2xl"}, "취소")
                ])
            ])
        ),

        // ── 모달: 할 일 ──────────────────────────────────────────────
        modals.todo && h('div', {className:"fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4", onClick:()=>setModals({...modals,todo:false})},
            h('div', {className:"bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 modal-enter", onClick:e=>e.stopPropagation()}, [
                h('h4', {className:"text-xl font-black mb-6"}, editTarget?"업무 수정":"업무 추가"),
                h('textarea', {id:'todo-text', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black mb-6 outline-none focus:ring-4 focus:ring-orange-100", rows:3, defaultValue:editTarget?.text||"", autoFocus:true}),
                h('div', {className:"flex gap-2"}, [
                    h('button', {onClick:()=>{
                        const text=document.getElementById('todo-text').value;
                        if(!text)return;
                        if(editTarget)setTodos(todos.map(t=>t.id===editTarget.id?{...t,text}:t));
                        else setTodos([{id:Date.now(),text,done:false,date:new Date().toLocaleString()},...todos]);
                        setModals({...modals,todo:false});
                    }, className:"flex-1 bg-[#a0522d] text-white font-black py-4 rounded-2xl shadow-md"}, "저장"),
                    h('button', {onClick:()=>setModals({...modals,todo:false}), className:"flex-1 bg-slate-100 font-bold py-4 rounded-2xl"}, "취소")
                ])
            ])
        ),

        // ── 모달: 독서 ───────────────────────────────────────────────
        modals.reading && h('div', {className:"fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-4", onClick:()=>setModals({...modals,reading:false})},
            h('div', {className:"bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden modal-enter", onClick:e=>e.stopPropagation()}, [
                h('div', {className:"p-8 autumn-gradient text-white flex justify-between items-center"}, [
                    h('h4', {className:"text-2xl font-black"}, editTarget?"독서 기록 수정":"새 책 등록"),
                    h('button', {onClick:()=>setModals({...modals,reading:false})}, h('i', {'data-lucide':'x'}))
                ]),
                h('div', {className:"p-8 space-y-4"}, [
                    h('input', {id:'read-title', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-black outline-none focus:ring-4 focus:ring-orange-100", defaultValue:editTarget?.title||"", placeholder:"책 제목", autoFocus:true}),
                    h('textarea', {id:'read-review', className:"w-full bg-slate-50 border-none rounded-xl px-5 py-4 font-bold resize-none outline-none focus:ring-4 focus:ring-orange-100", rows:4, defaultValue:editTarget?.review||"", placeholder:"감상문"}),
                    h('textarea', {id:'read-quotes', className:"w-full bg-orange-50 border-none rounded-xl px-5 py-4 font-bold resize-none outline-none focus:ring-4 focus:ring-orange-100", rows:3, defaultValue:editTarget?.quotes||"", placeholder:"기억에 남는 문구"}),
                    h('button', {onClick:()=>{
                        const title=document.getElementById('read-title').value;
                        if(!title)return;
                        const newData={id:editTarget?.id||Date.now(),title,review:document.getElementById('read-review').value,quotes:document.getElementById('read-quotes').value};
                        if(editTarget)setReadingLogs(readingLogs.map(r=>r.id===editTarget.id?newData:r));
                        else setReadingLogs([newData,...readingLogs]);
                        setModals({...modals,reading:false});
                    }, className:"w-full bg-[#a0522d] text-white font-black py-4 rounded-2xl shadow-xl"}, "저장")
                ])
            ])
        )
    ]);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
